  ─────────────────────────────────────────
  All scores/cards/scorers live in the EDITABLE DATA block below (updated by the
  daily Claude score task, or edit by hand). Everything else recalculates itself.
  Award rules: cards yellow=1pt red=1pt · best defence = fewest goals conceded ·
  wooden spoon = knocked out earliest (worst record breaks ties).
-->
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<title>JMAN World Cup 2026 Sweepstake</title>

<style>
:root {
  --bg:#f3f4f6; --card:#ffffff; --border:#e0e3e8; --text:#1a1d23; --muted:#6b7280;
  --strong:#19105b; --accent:#3411a3; --thead:#f8f9fb; --rowline:#eceef2; --rowhover:#f0f4ff;
  --gold-bg:#fdf6e3; --mine-bg:#f3e9ff;
  /* FIFA 26 brand palette */
  --wc-red:#EA0029; --wc-darkred:#7A1118; --wc-purple:#6231B5; --wc-lavender:#C5A8E8;
  --wc-blue:#2456C6; --wc-green:#1E8A4C; --wc-lime:#B6D438; --wc-teal:#6FE3CF; --wc-orange:#F05223; --wc-gold:#D4A943;
}
[data-theme="dark"] {
  --bg:#0f0e1c; --card:#1a1733; --border:#2d2a52; --text:#e9e8f4; --muted:#9c9abc;
  --strong:#c6bdff; --accent:#8d7bff; --thead:#211e40; --rowline:#272348; --rowhover:#252158;
  --gold-bg:#2e2a1a; --mine-bg:#3a2c63;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:Arial, sans-serif; background:var(--bg); color:var(--text); }

.header {
  position:relative; overflow:hidden;
  background:linear-gradient(100deg, #7A1118 0%, #EA0029 38%, #B01E5F 58%, #6231B5 82%, #2456C6 100%);
  min-height:64px; color:#fff; display:flex; align-items:center; padding:10px 20px; gap:14px; flex-wrap:wrap;
}
/* FIFA 26 concentric-stripe motifs, echoing the official brand artwork */
.header::before { content:""; position:absolute; left:-70px; top:-90px; width:240px; height:240px; border-radius:50%; pointer-events:none; opacity:0.5;
  background:radial-gradient(circle at center, transparent 0 60px, #C5A8E8 60px 76px, transparent 76px 88px, #6FE3CF 88px 102px, transparent 102px 114px, #B6D438 114px 126px, transparent 126px); }
.header::after { content:""; position:absolute; right:-80px; bottom:-110px; width:300px; height:300px; border-radius:50%; pointer-events:none; opacity:0.55;
  background:radial-gradient(circle at center, transparent 0 70px, #F05223 70px 88px, transparent 88px 100px, #C5A8E8 100px 116px, transparent 116px 128px, #6FE3CF 128px 142px, transparent 142px 154px, #B6D438 154px 166px, transparent 166px); }
.header > * { position:relative; z-index:1; }
.logo { font-weight:800; font-size:16px; letter-spacing:2px; white-space:nowrap; }
.logo span { font-weight:300; }
.hdr-div { width:1px; height:28px; background:rgba(255,255,255,0.25); }
.hdr-title { font-weight:700; font-size:18px; }
.hdr-sub { font-style:italic; font-size:12px; opacity:0.8; }
.hdr-spacer { flex:1; }
.hdr-meta { font-size:11px; opacity:0.85; text-align:right; line-height:1.5; }
.theme-btn { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.35); color:#fff; border-radius:5px; padding:6px 12px; font-family:Arial; font-size:12px; font-weight:700; cursor:pointer; }

.tabs { background:var(--card); border-bottom:1px solid var(--border); display:flex; padding:0 20px; gap:4px; overflow-x:auto; }
.tab { padding:12px 18px; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; }
.tab.active { color:var(--strong); border-bottom-color:var(--accent); }

.main { padding:18px 20px; max-width:1500px; margin:0 auto; }
.card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px 20px; margin-bottom:16px; }
.sec-title { font-size:14px; font-weight:700; color:var(--strong); margin-bottom:14px; }
.sec-title .note { font-weight:400; font-size:11px; color:var(--muted); font-style:italic; }

.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:16px; }
@media (max-width:900px){ .kpi-grid{grid-template-columns:repeat(2,1fr);} }
.kpi-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px; }
.kpi-card.hero { background:linear-gradient(135deg,#19105b,#3411a3); border:none; }
.kpi-card.hero .kpi-label,.kpi-card.hero .kpi-value,.kpi-card.hero .kpi-sub { color:#fff; }
.kpi-label { font-size:11px; color:var(--muted); margin-bottom:4px; }
.kpi-value { font-size:24px; font-weight:700; color:var(--strong); line-height:1.1; }
.kpi-sub { font-size:11px; color:var(--muted); margin-top:5px; }

.group-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
@media (max-width:1200px){ .group-grid{grid-template-columns:repeat(2,1fr);} }
@media (max-width:800px){ .group-grid{grid-template-columns:1fr;} }
.group-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:14px 16px; }
.group-name { font-size:13px; font-weight:700; color:var(--strong); margin-bottom:10px; }

table { width:100%; border-collapse:collapse; }
thead tr { background:var(--thead); }
th { padding:8px 9px; font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--border); text-align:left; }
th.num, td.num { text-align:center; }
td { padding:8px 9px; font-size:12px; color:var(--text); border-bottom:1px solid var(--rowline); }
tbody tr:hover td { background:var(--rowhover); }
.team { font-weight:700; color:var(--strong); white-space:nowrap; }
.owner { font-size:10px; color:var(--muted); }
.elim { text-decoration:line-through; opacity:0.55; }
tr.q1 td:first-child, tr.q2 td:first-child { border-left:3px solid #00b050; }
tr.q3 td:first-child { border-left:3px solid #ffc000; }
tr.q4 td:first-child { border-left:3px solid #ff5555; }
.legend { display:flex; gap:18px; font-size:11px; color:var(--muted); margin-top:12px; flex-wrap:wrap; }
.dot { display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:5px; vertical-align:-1px; }

.bracket { display:flex; gap:24px; overflow-x:auto; padding:6px 2px 14px; }
.round { display:flex; flex-direction:column; justify-content:space-around; gap:12px; min-width:200px; }
.round-name { font-size:11px; font-weight:700; text-transform:uppercase; color:var(--muted); text-align:center; letter-spacing:0.5px; }
.match { background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; font-size:12px; }
.match .mhead { font-size:9px; color:var(--muted); padding:4px 10px 0; text-transform:uppercase; letter-spacing:0.4px; }
.match .row { display:flex; justify-content:space-between; gap:8px; padding:6px 10px; }
.match .row + .row { border-top:1px solid var(--rowline); }
.match .w { font-weight:700; color:var(--strong); background:var(--rowhover); }
.match .score { font-weight:700; }
.tbd { color:var(--muted); font-style:italic; }
.final-col .match { border:2px solid var(--accent); }

.fx-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:900px){ .fx-grid{grid-template-columns:1fr;} }
.fx { display:flex; align-items:center; gap:12px; padding:9px 4px; border-bottom:1px solid var(--rowline); font-size:12px; }
.fx-date { width:100px; color:var(--muted); font-size:11px; line-height:1.4; }
.fx-teams { flex:1; font-weight:700; color:var(--strong); }
.fx-teams .owner { font-weight:400; }
.fx-score { font-weight:700; font-size:14px; color:var(--strong); min-width:44px; text-align:center; }
.fx-tag { font-size:10px; font-weight:700; padding:3px 8px; border-radius:10px; white-space:nowrap; }
.tag-grp { background:var(--thead); color:var(--muted); border:1px solid var(--border); }
.tag-live { background:#ff6196; color:#fff; }

.award-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media (max-width:1000px){ .award-grid{grid-template-columns:1fr;} }
.award-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.award-icon { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.award-name { font-size:14px; font-weight:700; color:var(--strong); }
.award-desc { font-size:11px; color:var(--muted); }
.rank1 td { background:var(--gold-bg) !important; font-weight:700; }
.empty { font-size:12px; color:var(--muted); font-style:italic; padding:10px 0; }
.chart-wrap { height:230px; }

/* ===== FIFA 26 brand flourishes ===== */
.wc-stripes { height:7px; background:repeating-linear-gradient(90deg,
  var(--wc-red) 0 60px, var(--wc-purple) 60px 120px, var(--wc-teal) 120px 180px,
  var(--wc-lavender) 180px 240px, var(--wc-blue) 240px 300px, var(--wc-lime) 300px 360px,
  var(--wc-orange) 360px 420px, var(--wc-green) 420px 480px, var(--wc-darkred) 480px 540px); }
.wc-logo { height:52px; width:auto; display:block; background:#ffffff; padding:5px 8px; border-radius:9px; box-shadow:0 1px 4px rgba(0,0,0,0.3); }
.group-card { border-top:4px solid var(--wc-red); }
.group-card:nth-child(2) { border-top-color:var(--wc-purple); }
.group-card:nth-child(3) { border-top-color:var(--wc-blue); }
.group-card:nth-child(4) { border-top-color:var(--wc-green); }
.group-card:nth-child(5) { border-top-color:var(--wc-orange); }
.group-card:nth-child(6) { border-top-color:var(--wc-teal); }
.group-card:nth-child(7) { border-top-color:var(--wc-lavender); }
.group-card:nth-child(8) { border-top-color:var(--wc-lime); }
.group-card:nth-child(9) { border-top-color:var(--wc-darkred); }
.group-card:nth-child(10) { border-top-color:var(--wc-purple); }
.group-card:nth-child(11) { border-top-color:var(--wc-red); }
.group-card:nth-child(12) { border-top-color:var(--wc-blue); }
.kpi-card.hero { background:linear-gradient(135deg,#19105b 0%,#3411a3 55%,var(--wc-purple) 100%); position:relative; overflow:hidden; }
.kpi-card.hero::after { content:""; position:absolute; right:-22px; top:-22px; width:78px; height:78px; border-radius:50%;
  background:radial-gradient(circle at center, transparent 0 18px, var(--wc-red) 18px 26px, var(--wc-lavender) 26px 32px, var(--wc-teal) 32px 38px, transparent 38px); opacity:0.85; }
.tab.active { border-bottom-color:var(--wc-red); }
.final-col .match { border:2px solid var(--wc-gold); box-shadow:0 0 0 3px rgba(212,169,67,0.18); }

/* ===== "My teams" highlight ===== */
tr.mine td { background:var(--mine-bg) !important; }
.match .row.mine { background:var(--mine-bg); }
.fx.mine { background:var(--mine-bg); border-radius:4px; }
.who-wrap { display:flex; align-items:center; gap:8px; }
.who-label { font-size:11px; font-weight:700; color:#fff; opacity:0.9; }
.who-select { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.4); color:#fff;
  border-radius:5px; padding:6px 10px; font-family:Arial; font-size:12px; font-weight:700; cursor:pointer; max-width:190px; }
.who-select option { color:#1a1d23; }
</style>
</head>

const ROUND_NAMES = {R32:"Round of 32", R16:"Round of 16", QF:"Quarter-finals", SF:"Semi-finals", "3RD":"Third Place", F:"Final"};
const STAGE_RANK = {Group:0, R32:1, R16:2, QF:3, SF:4, "3RD":4, F:5, Champion:6};

let SELECTED = ""; // participant name filter — highlights their teams everywhere
const isMine = t => !!SELECTED && (PARTICIPANTS.find(p => p[0] === SELECTED) || [,[]])[1].includes(t);
function setWho(name) {
  SELECTED = name;
  try { localStorage.setItem("jman-wc-who", name); } catch(e) {}
  renderAll();
}

const ownersOf = t => PARTICIPANTS.filter(p => p[1].includes(t)).map(p => p[0]);
const ownerHtml = t => `<span class="owner">${ownersOf(t).join(" · ")}</span>`;
const esc = s => String(s);

function teamStats() {
  const st = {};
  Object.values(GROUPS).flat().forEach(t => st[t] = {pld:0,w:0,d:0,l:0,gf:0,ga:0,y:0,r:0});
  MATCHES.forEach(m => {
    const res = RESULTS[m[0]];
    if (!res) return;
    const [hs,as,hy,hr,ay,ar,status] = res;
    const h = st[m[4]], a = st[m[5]];
    h.gf+=hs; h.ga+=as; a.gf+=as; a.ga+=hs;
    h.y+=hy; h.r+=hr; a.y+=ay; a.r+=ar;
    if (status === "FT") {
      h.pld++; a.pld++;
      if (hs>as) {h.w++; a.l++;} else if (hs<as) {a.w++; h.l++;} else {h.d++; a.d++;}
    }
  });
  KNOCKOUT.forEach(k => {
    if (!k.s || !k.teams[0] || !k.teams[1]) return;
    const h = st[k.teams[0]], a = st[k.teams[1]];
    if (!h || !a) return;
    h.pld++; a.pld++;
    h.gf+=k.s[0]; h.ga+=k.s[1]; a.gf+=k.s[1]; a.ga+=k.s[0];
    if (k.cards) { h.y+=k.cards[0]; h.r+=k.cards[1]; a.y+=k.cards[2]; a.r+=k.cards[3]; }
  });
  return st;
}

function groupTable(g, st) {
  return GROUPS[g].map(t => ({t, ...st[t], pts: st[t].w*3 + st[t].d, gd: st[t].gf - st[t].ga}))
    .sort((x,y) => y.pts-x.pts || y.gd-x.gd || y.gf-x.gf || x.t.localeCompare(y.t));
}

function stageOf(team) {
  if (CHAMPION === team) return "Champion";
  let best = "Group";
  KNOCKOUT.forEach(k => {
    if (k.teams.includes(team) && STAGE_RANK[k.r] > STAGE_RANK[best]) best = k.r;
  });
  return best;
}
const stageLabel = s => s==="Group" ? "Group Stage" : (s==="Champion" ? "🏆 Champion" : ROUND_NAMES[s]);
const isAlive = t => CHAMPION ? CHAMPION===t || false : !ELIMINATED.some(e => e[0]===t);

function fmtDate(iso) {
  const d = new Date(iso + "T12:00:00");
  return d.toLocaleDateString("en-GB", {weekday:"short", day:"numeric", month:"short"});
}
function fmtTime(t) {
  let [h,m] = t.split(":").map(Number);
  const ap = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  return `${h}:${String(m).padStart(2,"0")} ${ap}`;
}

/* ---------- KPIs ---------- */
function renderKpis(st) {
  const played = Object.keys(RESULTS).filter(id => RESULTS[id][6]==="FT").length
    + KNOCKOUT.filter(k => k.s).length;
  const goals = Object.values(st).reduce((s,x) => s+x.gf, 0);
  const yel = Object.values(st).reduce((s,x) => s+x.y, 0);
  const red = Object.values(st).reduce((s,x) => s+x.r, 0);
  const standings = PARTICIPANTS.map(p => ({
    name: p[0],
    alive: p[1].filter(isAlive).length,
    best: Math.max(...p[1].map(t => STAGE_RANK[stageOf(t)]))
  })).sort((a,b) => b.alive-a.alive || b.best-a.best);
  const top = standings[0];
  const coLeaders = standings.filter(s => s.alive===top.alive && s.best===top.best).length;
  const leaderTxt = played===0 ? "All to play for" : (coLeaders>1 ? `${coLeaders}-way tie` : top.name);
  const leaderSub = played===0 ? "31 contenders · kicks off 11 Jun" :
    (coLeaders>1 ? `${top.alive} team(s) alive each` : `${top.alive} of 2 teams alive · ${stageLabel(Object.keys(STAGE_RANK).find(k=>STAGE_RANK[k]===top.best) || "Group")}`);
  document.getElementById("kpis").innerHTML = `
    <div class="kpi-card hero"><div class="kpi-label">Current Leader</div><div class="kpi-value">${leaderTxt}</div><div class="kpi-sub">${leaderSub}</div></div>
    <div class="kpi-card"><div class="kpi-label">Matches Played</div><div class="kpi-value">${played} / 104</div><div class="kpi-sub">${played===0 ? "Opening match: Mexico vs South Africa" : "Group + knockout"}</div></div>
    <div class="kpi-card"><div class="kpi-label">Goals Scored</div><div class="kpi-value">${goals}</div><div class="kpi-sub">${played ? (goals/played).toFixed(1)+" per match" : "—"}</div></div>
    <div class="kpi-card"><div class="kpi-label">Cards Shown</div><div class="kpi-value">${yel+red}</div><div class="kpi-sub">${yel} yellow · ${red} red</div></div>`;
}

/* ---------- Knockout ---------- */
function koBox(k) {
  const name = (i) => {
    const t = k.teams[i];
    if (!t) return `<span class="tbd">${k.p[i]}</span>`;
    return `<span>${t} ${ownerHtml(t)}</span>`;
  };
  const winIdx = k.s ? (k.s[0]>k.s[1] ? 0 : (k.s[1]>k.s[0] ? 1 : (k.pens ? (parseInt(k.pens)>parseInt(k.pens.split("-")[1])?0:1) : -1))) : -1;
  const score = i => k.s ? `<span class="score">${k.s[i]}${k.pens?` <small>(${k.pens.split("-")[i]})</small>`:""}</span>` : "";
  return `<div class="match"><div class="mhead">${fmtDate(k.d)} · ${k.v}</div>
    <div class="row${winIdx===0?' w':''}${isMine(k.teams[0])?' mine':''}">${name(0)}${score(0)}</div>
    <div class="row${winIdx===1?' w':''}${isMine(k.teams[1])?' mine':''}">${name(1)}${score(1)}</div></div>`;
}
function renderKnockout() {
  const rounds = ["R32","R16","QF","SF","F"];
  let html = '<div class="bracket">';
  rounds.forEach(r => {
    const ms = KNOCKOUT.filter(k => k.r===r);
    html += `<div class="round${r==="F"?" final-col":""}"><div class="round-name">${ROUND_NAMES[r]}${r==="F"?" 🏆":""}</div>${ms.map(koBox).join("")}`;
    if (r==="F") {
      const tp = KNOCKOUT.find(k => k.r==="3RD");
      html += `<div class="round-name" style="margin-top:14px;">Third Place</div>${koBox(tp)}`;
    }
    html += `</div>`;
  });
  html += "</div>";
  document.getElementById("tab-knockout").innerHTML = `<div class="card"><div class="sec-title">Road to the Final <span class="note">— Round of 32 pairings confirmed as groups finish · scroll right →</span></div>${html}</div>`;
}

function renderFixtures() {
  const allFx = [
    ...MATCHES.map(m => ({id:m[0], d:m[1], t:m[2], label:`${m[4]} vs ${m[5]}`, mine:isMine(m[4])||isMine(m[5]), tag:"GROUP "+m[3], v:m[6], res:RESULTS[m[0]]})),
    ...KNOCKOUT.map(k => ({id:k.id, d:k.d, t:k.t, label: k.teams[0]&&k.teams[1] ? `${k.teams[0]} vs ${k.teams[1]}` : `${k.p[0]} vs ${k.p[1]}`, mine:isMine(k.teams[0])||isMine(k.teams[1]), tag:ROUND_NAMES[k.r].toUpperCase(), v:k.v, res:k.s ? [k.s[0],k.s[1],0,0,0,0,"FT"] : null, pens:k.pens}))
  ].sort((x,y) => (x.d+x.t).localeCompare(y.d+y.t));
  const upcoming = allFx.filter(f => !f.res).slice(0,14);
  const done = allFx.filter(f => f.res).reverse().slice(0,14);
  const fxRow = f => `<div class="fx${f.mine?' mine':''}"><div class="fx-date">${fmtDate(f.d)}<br>${fmtTime(f.t)} ET</div>
    <div class="fx-teams">${f.label}<br><span class="owner">${f.v}</span></div>

  document.getElementById("tab-fixtures").innerHTML = `<div class="fx-grid">
    <div class="card"><div class="sec-title">Upcoming Games</div>${upcoming.map(fxRow).join("") || '<div class="empty">No more fixtures — tournament complete!</div>'}</div>

      <div class="card"><div class="award-head"><div class="award-icon" style="background:var(--wc-red);">🟥</div>
        <div><div class="award-name">Dirtiest Team</div><div class="award-desc">Most cards — yellow = 1 pt, red = 1 pt</div></div></div>${dirtyHtml}</div>
      <div class="card"><div class="award-head"><div class="award-icon" style="background:var(--wc-green);">🧤</div>
        <div><div class="award-name">Best Defence</div><div class="award-desc">Fewest goals conceded</div></div></div>${defHtml}</div>
      <div class="card"><div class="award-head"><div class="award-icon" style="background:var(--wc-purple);">🥄</div>
        <div><div class="award-name">Wooden Spoon</div><div class="award-desc">Knocked out earliest — worst record breaks ties</div></div></div>${spoonHtml}</div>
    </div>`;

  if (SCORERS.length) {
    const top8 = SCORERS.slice(0,8);
    if (bootChart) bootChart.destroy();
    const dark = document.documentElement.dataset.theme === "dark";
    bootChart = new Chart(document.getElementById("bootChart"), {
      type:"bar",
      data:{ labels: top8.map(s => `${s[0]} (${s[1]})`),
        datasets:[{ data: top8.map(s => s[2]), backgroundColor:["#19105b","#3411a3","#ff6196","#26d4f0","#a16bdb","#16978e","#a6265e","#71eae1"].map((c,i)=>dark&&i===0?"#8d7bff":c), borderRadius:4 }]},
      options:{ indexAxis:"y", responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{ x:{grid:{color: dark?"#2d2a52":"#e0e3e8"}, ticks:{font:{family:"Arial",size:11}, stepSize:1, color: dark?"#9c9abc":"#6b7280"}},
                 y:{grid:{display:false}, ticks:{font:{family:"Arial",size:11}, color: dark?"#9c9abc":"#6b7280"}}}}
    });
  }
}

/* ---------- Shell ---------- */
function showTab(id, el) {
  ["groups","knockout","fixtures","awards"].forEach(t => document.getElementById("tab-"+t).style.display = (t===id ? "" : "none"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === "dark" ? "light" : "dark";
  html.dataset.theme = next;
  document.getElementById("themeBtn").textContent = next === "dark" ? "☀️ Light" : "🌙 Dark";
  try { localStorage.setItem("jman-wc-theme", next); } catch(e) {}
  renderAll();
}
function renderAll() {
  const st = teamStats();
  renderKpis(st);
  renderGroups(st);
  renderKnockout();
  renderFixtures();
  renderAwards(st);
}
(function init() {
  try {
    const saved = localStorage.getItem("jman-wc-theme");
    if (saved) { document.documentElement.dataset.theme = saved;
      document.getElementById("themeBtn").textContent = saved === "dark" ? "☀️ Light" : "🌙 Dark"; }
  } catch(e) {}
  const sel = document.getElementById("whoami");
  [...PARTICIPANTS].map(p => p[0]).sort((a,b) => a.localeCompare(b)).forEach(n => {
    const o = document.createElement("option"); o.value = n; o.textContent = n; sel.appendChild(o);
  });
  try {
    const who = localStorage.getItem("jman-wc-who");
    if (who && PARTICIPANTS.some(p => p[0]===who)) { SELECTED = who; sel.value = who; }
  } catch(e) {}
  document.getElementById("lastUpd").textContent = LAST_UPDATED;
  renderAll();
})();
</script>
</body>
</html>
